<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>uurprijzen vandaag</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #0b1220;
      --border: #263244;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #facc15;
      --button: #2563eb;
      --control-width: 116px;
      --control-height: 48px;
      --label-height: 58px;
      --solar-label-height: 0px;
      --bar-gap: 4px;
      --grid-step: 10%;
      --solar-grid-step: 20%;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    main {
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
      padding: 11px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: .2px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: white;
      width: var(--control-width);
      height: var(--control-height);
      padding: 8px 11px;
      font-size: .88rem;
      cursor: pointer;
      font-weight: 750;
      white-space: nowrap;
    }

    button:active { transform: translateY(1px); }

    .stats-row {
      display: grid;
      grid-template-columns: var(--control-width) var(--control-width) 1fr var(--control-width);
      gap: 8px;
      flex: 0 0 auto;
      align-items: stretch;
    }

    .stat, .modebox {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: var(--control-width);
      height: var(--control-height);
      padding: 6px 9px;
      min-height: 0;
    }

    .modebox {
      grid-column: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .modebox button {
      background: var(--button);
      border-radius: 12px;
      font-size: .88rem;
      padding: 8px 11px;
    }

    .label {
      color: var(--muted);
      font-size: .66rem;
      margin-bottom: 2px;
    }

    .value {
      font-size: .98rem;
      font-weight: 850;
      line-height: 1.08;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .chart-title {
      margin: 0 0 4px;
      font-size: .82rem;
      line-height: 1.2;
      font-weight: 800;
      flex: 0 0 auto;
    }

    #status {
      color: var(--muted);
      font-size: .70rem;
      line-height: 1.2;
      min-height: 13px;
      margin: 0 0 3px;
      flex: 0 0 auto;
    }

    .chart {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
      align-items: stretch;
      position: relative;
    }

    #chart::before, #solarChart::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: calc(var(--label-height) + var(--bar-gap));
      background:
        repeating-linear-gradient(
          to top,
          rgba(255,255,255,.16) 0 1px,
          transparent 1px var(--grid-step)
        );
      pointer-events: none;
      z-index: 0;
    }

    #solarChart::before {
      bottom: 0;
      background:
        repeating-linear-gradient(
          to top,
          rgba(255,255,255,.16) 0 1px,
          transparent 1px var(--solar-grid-step)
        );
    }

    .bar-wrap {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr var(--label-height);
      gap: var(--bar-gap);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .solar-wrap {
      grid-template-rows: 1fr;
      gap: 0;
    }

    .bar-area {
      min-height: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
      overflow: visible;
    }

    .bar {
      width: 100%;
      min-height: 2px;
      border-radius: 5px 5px 0 0;
      background: var(--blue);
      position: relative;
    }

    .bar.cheap { background: var(--green); }
    .bar.expensive { background: var(--red); }
    .bar.solar { background: var(--yellow); box-shadow: 0 0 10px rgba(250, 204, 21, .25); }

    .bar.now {
      background: var(--yellow);
      box-shadow: 0 0 14px rgba(250, 204, 21, .95);
      z-index: 2;
    }

    .bar.now::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 9px white;
    }

    .bar-label {
      height: var(--label-height);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(.46rem, 1.45vw, .60rem);
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
    }

    .empty {
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
      padding: 16px;
      font-size: .92rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 390px) {
      main { padding: 9px; gap: 8px; }
      h1 { font-size: .98rem; }
      :root { --control-width: 104px; --control-height: 44px; --label-height: 54px; }
      button { font-size: .8rem; padding: 7px 9px; }
      .stats-row { gap: 6px; }
      .stat { padding: 5px 7px; }
      .value { font-size: .9rem; }
      .label { font-size: .68rem; }
      .chart { gap: 1px; }
      .bar-wrap { gap: 3px; }
      .bar-label { font-size: .46rem; }
    }

    @media (max-height: 680px) {
      main { padding: 8px; gap: 7px; }
      h1 { font-size: .98rem; }
      :root { --control-height: 42px; --label-height: 46px; --bar-gap: 2px; }
      .value { font-size: .9rem; }
      #status { display: none; }
      .card { padding: 7px; }
      .bar-wrap { gap: 2px; }
      .chart-title { font-size: .76rem; margin-bottom: 2px; }
    }
  </style>
</head>

<body>
  <main>
    <header class="topbar">
      <h1 id="title">uurprijzen vandaag</h1>
      <button id="switchDay">morgen</button>
    </header>

    <section class="stats-row">
      <div class="stat">
        <div class="label">Nu</div>
        <div id="now" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Gemiddeld</div>
        <div id="avg" class="value">–</div>
      </div>

      <div class="modebox">
        <button id="switchMode">afnemen</button>
      </div>
    </section>

    <section class="card">
      <p class="chart-title">Stroomprijs (€ / kWh)</p>
      <p id="status">Laden...</p>
      <div id="chart" class="chart"></div>
    </section>

    <section class="card">
      <p class="chart-title">Verwachte opbrengst zonnepanelen</p>
      <div id="solarChart" class="chart"></div>
    </section>
  </main>

  <script>
    const API = "https://api.energyzero.nl/v1/energyprices";
    const WEATHER_API = "https://api.open-meteo.com/v1/forecast";

    const BTW = 0.21;
    let chartMax = 1.00;

    const COSTS = {
      energyTaxInclVat: 0.11085,
      supplierMarkupUseExVat: 0.04073,
      supplierDeductionReturnExVat: 0.0453,
      variableGridCostInclVat: 0
    };

    const SOLAR = {
      kwp: 3 * 2700 / 1000,
      azimuthDeg: 210,
      tiltDeg: 20,
      performanceRatio: 0.82,
      orientationFactor: 0.94,
      fallbackLatitude: 52.37,
      fallbackLongitude: 4.90
    };

    let showingTomorrow = false;
    let mode = "use";
    let userLocationPromise = null;

    const els = {
      title: document.querySelector("#title"),
      switchDay: document.querySelector("#switchDay"),
      switchMode: document.querySelector("#switchMode"),
      status: document.querySelector("#status"),
      now: document.querySelector("#now"),
      avg: document.querySelector("#avg"),
      chart: document.querySelector("#chart"),
      solarChart: document.querySelector("#solarChart")
    };

    els.switchDay.addEventListener("click", () => {
      showingTomorrow = !showingTomorrow;
      loadPrices();
    });

    els.switchMode.addEventListener("click", () => {
      mode = mode === "use" ? "return" : "use";
      loadPrices();
    });

    loadPrices();

    function selectedDate() {
      const date = new Date();
      if (showingTomorrow) date.setDate(date.getDate() + 1);
      return date;
    }

    function localDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dayRange(date) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);

      const end = new Date(date);
      end.setHours(23, 59, 59, 999);

      return {
        fromDate: start.toISOString(),
        tillDate: end.toISOString()
      };
    }

    async function loadPrices() {
      resetScreen();

      const dayText = showingTomorrow ? "morgen" : "vandaag";
      const modeText = mode === "use" ? "afnemen" : "terugleveren";

      document.title = "uurprijzen " + dayText + ", " + modeText;
      els.title.textContent = "uurprijzen " + dayText + ", " + modeText;
      els.switchDay.textContent = showingTomorrow ? "vandaag" : "morgen";
      els.switchMode.textContent = mode === "use" ? "terugleveren" : "afnemen";
      els.status.textContent = "Laden...";

      try {
        const today = new Date();
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);

        const [todayPrices, tomorrowPrices, todaySolar, tomorrowSolar] = await Promise.all([
          fetchDayPrices(today),
          fetchDayPrices(tomorrow),
          fetchSolarForecast(today),
          fetchSolarForecast(tomorrow)
        ]);

        const allPrices = [...todayPrices, ...tomorrowPrices];

        if (!allPrices.length) {
          throw new Error("Nog geen prijzen beschikbaar.");
        }

        const allScaleValues = allPrices.flatMap(item => [
          totalPrice(item.basePrice, "use"),
          totalPrice(item.basePrice, "return")
        ]);

        chartMax = roundedChartMax(Math.max(...allScaleValues));
        document.documentElement.style.setProperty("--grid-step", (0.1 / chartMax * 100) + "%");

        const selectedPrices = (showingTomorrow ? tomorrowPrices : todayPrices)
          .map(item => ({
            ...item,
            price: totalPrice(item.basePrice, mode)
          }));

        if (!selectedPrices.length) {
          throw new Error("Nog geen prijzen beschikbaar voor " + dayText + ".");
        }

        render(selectedPrices);
        renderSolar(showingTomorrow ? tomorrowSolar : todaySolar, [...todaySolar, ...tomorrowSolar]);
        els.status.textContent = "";
      } catch (error) {
        els.status.textContent = error.message;
        els.chart.innerHTML = '<div class="empty">' + error.message + '</div>';
        renderSolarFallback();
      }
    }

    async function fetchDayPrices(date) {
      const range = dayRange(date);

      const params = new URLSearchParams({
        fromDate: range.fromDate,
        tillDate: range.tillDate,
        interval: "4",
        usageType: "1",
        inclBtw: "true"
      });

      const response = await fetch(API + "?" + params.toString());

      if (!response.ok) {
        throw new Error("Prijzen konden niet worden opgehaald.");
      }

      const data = await response.json();
      const raw = data.Prices || data.prices || [];

      return raw
        .map(item => {
          const baseInclVat = Number(item.price ?? item.Price);

          return {
            time: new Date(item.readingDate || item.ReadingDate),
            basePrice: baseInclVat
          };
        })
        .filter(item => Number.isFinite(item.basePrice))
        .sort((a, b) => a.time - b.time);
    }

    async function getLocation() {
      if (userLocationPromise) return userLocationPromise;

      userLocationPromise = new Promise(resolve => {
        if (!navigator.geolocation) {
          resolve({ latitude: SOLAR.fallbackLatitude, longitude: SOLAR.fallbackLongitude });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          position => resolve({
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          }),
          () => resolve({ latitude: SOLAR.fallbackLatitude, longitude: SOLAR.fallbackLongitude }),
          { enableHighAccuracy: false, timeout: 4000, maximumAge: 60 * 60 * 1000 }
        );
      });

      return userLocationPromise;
    }

    async function fetchSolarForecast(date) {
      const location = await getLocation();
      const day = localDateString(date);

      const params = new URLSearchParams({
        latitude: location.latitude,
        longitude: location.longitude,
        hourly: "shortwave_radiation,uv_index",
        timezone: "auto",
        start_date: day,
        end_date: day
      });

      const response = await fetch(WEATHER_API + "?" + params.toString());
      if (!response.ok) return solarFallbackForDate(date);

      const data = await response.json();
      const times = data.hourly?.time || [];
      const radiation = data.hourly?.shortwave_radiation || [];
      const uv = data.hourly?.uv_index || [];

      const result = times.map((time, index) => {
        const rad = Math.max(0, Number(radiation[index] || 0));
        const uvIndex = Math.max(0, Number(uv[index] || 0));
        const radiationYield = (rad / 1000) * SOLAR.kwp * SOLAR.performanceRatio * SOLAR.orientationFactor;
        const uvBoost = uvIndex > 0 ? Math.min(1.12, 0.88 + uvIndex / 40) : 0;

        return {
          time: new Date(time),
          kwh: Math.max(0, radiationYield * (uvBoost || 1))
        };
      });

      return normalizeSolarHours(result, date);
    }

    function normalizeSolarHours(items, date) {
      const byHour = new Map(items.map(item => [item.time.getHours(), item]));
      const result = [];

      for (let hour = 0; hour < 24; hour++) {
        const time = new Date(date);
        time.setHours(hour, 0, 0, 0);
        result.push(byHour.get(hour) || { time, kwh: 0 });
      }

      return result;
    }

    function solarFallbackForDate(date) {
      const month = date.getMonth();
      const dayFactor = month >= 4 && month <= 7 ? 1 : month >= 2 && month <= 9 ? 0.72 : 0.35;
      const peak = 2.7 * dayFactor;
      const result = [];

      for (let hour = 0; hour < 24; hour++) {
        const time = new Date(date);
        time.setHours(hour, 0, 0, 0);
        const x = (hour - 12.6) / 5.2;
        const curve = Math.max(0, 1 - x * x);
        result.push({ time, kwh: peak * curve });
      }

      return result;
    }

    function roundedChartMax(maxValue) {
      const safeMax = Math.max(0.2, maxValue);
      return Math.ceil(safeMax / 0.2) * 0.2;
    }

    function roundedSolarMax(maxValue) {
      const safeMax = Math.max(0.5, maxValue);
      return Math.ceil(safeMax / 0.5) * 0.5;
    }

    function totalPrice(baseInclVat, selectedMode = mode) {
      if (selectedMode === "use") {
        const markupInclVat = COSTS.supplierMarkupUseExVat * (1 + BTW);

        return (
          baseInclVat +
          markupInclVat +
          COSTS.energyTaxInclVat +
          COSTS.variableGridCostInclVat
        );
      }

      const deductionInclVat = COSTS.supplierDeductionReturnExVat * (1 + BTW);
      return baseInclVat - deductionInclVat;
    }

    function resetScreen() {
      els.now.textContent = "–";
      els.avg.textContent = "–";
      els.chart.innerHTML = "";
      els.solarChart.innerHTML = "";
    }

    function euro(value) {
      const sign = value < 0 ? "-€" : "€";
      return sign + Math.abs(value).toFixed(2);
    }

    function hourNumber(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        hour12: false
      });
    }

    function render(prices) {
      const values = prices.map(item => item.price);
      const avg = values.reduce((sum, value) => sum + value, 0) / values.length;
      const min = Math.min(...values);
      const max = Math.max(...values);

      const now = new Date();

      const current = prices.find((item, index) => {
        const next = prices[index + 1]?.time || new Date(item.time.getTime() + 60 * 60 * 1000);
        return now >= item.time && now < next;
      });

      els.now.textContent = current ? euro(current.price) : "–";
      els.avg.textContent = euro(avg);

      renderChart(prices, min, max, current);
    }

    function renderChart(prices, min, max, current) {
      els.chart.innerHTML = "";

      const byHour = new Map();

      prices.forEach(item => {
        byHour.set(item.time.getHours(), item);
      });

      for (let hour = 0; hour < 24; hour++) {
        const item = byHour.get(hour);

        const wrap = document.createElement("div");
        wrap.className = "bar-wrap";

        const barArea = document.createElement("div");
        barArea.className = "bar-area";

        const label = document.createElement("div");
        label.className = "bar-label";

        if (!item) {
          const emptyBar = document.createElement("div");
          emptyBar.className = "bar";
          emptyBar.style.height = "2px";
          label.textContent = String(hour).padStart(2, "0") + " -";
          barArea.appendChild(emptyBar);
          wrap.appendChild(barArea);
          wrap.appendChild(label);
          els.chart.appendChild(wrap);
          continue;
        }

        const bar = document.createElement("div");
        bar.className = "bar";

        if (item.price === min) bar.classList.add("cheap");
        if (item.price === max) bar.classList.add("expensive");
        if (current && item.time.getTime() === current.time.getTime()) bar.classList.add("now");

        const clampedPrice = Math.max(0, Math.min(item.price, chartMax));
        const height = Math.max(2, (clampedPrice / chartMax) * 100);

        bar.style.height = height + "%";
        bar.title = hourNumber(item.time) + " - " + euro(item.price);

        label.textContent = hourNumber(item.time) + " - " + euro(item.price);

        barArea.appendChild(bar);
        wrap.appendChild(barArea);
        wrap.appendChild(label);
        els.chart.appendChild(wrap);
      }
    }

    function renderSolar(selectedSolar, allSolar) {
      els.solarChart.innerHTML = "";

      const solarMax = roundedSolarMax(Math.max(...allSolar.map(item => item.kwh)));
      document.documentElement.style.setProperty("--solar-grid-step", (0.5 / solarMax * 100) + "%");

      const byHour = new Map();
      selectedSolar.forEach(item => byHour.set(item.time.getHours(), item));

      for (let hour = 0; hour < 24; hour++) {
        const item = byHour.get(hour) || { kwh: 0, time: new Date() };

        const wrap = document.createElement("div");
        wrap.className = "bar-wrap solar-wrap";

        const barArea = document.createElement("div");
        barArea.className = "bar-area";

        const bar = document.createElement("div");
        bar.className = "bar solar";

        const height = Math.max(2, (Math.max(0, Math.min(item.kwh, solarMax)) / solarMax) * 100);
        bar.style.height = height + "%";
        bar.title = String(hour).padStart(2, "0") + ":00 - " + item.kwh.toFixed(2) + " kWh";

        barArea.appendChild(bar);
        wrap.appendChild(barArea);
        els.solarChart.appendChild(wrap);
      }
    }

    function renderSolarFallback() {
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const selected = showingTomorrow ? solarFallbackForDate(tomorrow) : solarFallbackForDate(today);
      renderSolar(selected, [...solarFallbackForDate(today), ...solarFallbackForDate(tomorrow)]);
    }
  </script>
</body>
</html>
