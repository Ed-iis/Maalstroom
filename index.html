<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dynamische stroomprijzen</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;margin:0;background:#0f172a;color:#e5e7eb}
  main{max-width:1100px;margin:auto;padding:24px}
  h1{margin:0 0 8px}
  .card{background:#111827;border:1px solid #263244;border-radius:18px;padding:18px;margin:16px 0}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button,select,input{border-radius:10px;border:1px solid #374151;background:#0b1220;color:#e5e7eb;padding:10px}
  button{cursor:pointer;background:#2563eb;border:0}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
  .stat{background:#0b1220;border-radius:14px;padding:14px}
  .big{font-size:1.5rem;font-weight:700}
  #chart{display:flex;align-items:end;gap:3px;height:300px;overflow-x:auto;padding-top:16px}
  .bar{min-width:14px;border-radius:6px 6px 0 0;background:#38bdf8;position:relative}
  .bar.now{outline:2px solid white}
  .bar.cheap{background:#22c55e}
  .bar.expensive{background:#ef4444}
  .table{width:100%;border-collapse:collapse}
  th,td{padding:8px;border-bottom:1px solid #263244;text-align:right}
  th:first-child,td:first-child{text-align:left}
  .muted{color:#94a3b8}
</style>
</head>
<body>
<main>
  <h1>Dynamische stroomprijzen</h1>
  <p class="muted">Nederland · prijzen per kWh · inclusief btw · kwartierprijzen waar beschikbaar</p>

  <section class="card">
    <div class="row">
      <label>Datum <input id="date" type="date"></label>
      <label>Interval
        <select id="interval">
          <option value="3">Kwartierprijzen</option>
          <option value="4">Uurprijzen</option>
        </select>
      </label>
      <button id="load">Laden</button>
    </div>
    <p id="status" class="muted"></p>
  </section>

  <section class="stats">
    <div class="stat"><div class="muted">Nu</div><div id="now" class="big">–</div></div>
    <div class="stat"><div class="muted">Goedkoopste</div><div id="min" class="big">–</div></div>
    <div class="stat"><div class="muted">Duurste</div><div id="max" class="big">–</div></div>
    <div class="stat"><div class="muted">Gemiddeld</div><div id="avg" class="big">–</div></div>
  </section>

  <section class="card">
    <h2>Grafiek</h2>
    <div id="chart"></div>
  </section>

  <section class="card">
    <h2>Tabel</h2>
    <table class="table">
      <thead><tr><th>Tijd</th><th>Prijs</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </section>
</main>

<script>
const API = "https://api.energyzero.nl/v1/energyprices";
const tz = "Europe/Amsterdam";

const els = {
  date: document.querySelector("#date"),
  interval: document.querySelector("#interval"),
  load: document.querySelector("#load"),
  status: document.querySelector("#status"),
  now: document.querySelector("#now"),
  min: document.querySelector("#min"),
  max: document.querySelector("#max"),
  avg: document.querySelector("#avg"),
  chart: document.querySelector("#chart"),
  tbody: document.querySelector("#tbody")
};

els.date.value = new Date().toISOString().slice(0,10);
els.load.onclick = loadPrices;
loadPrices();

function localDayUtcRange(dateStr){
  const startLocal = new Date(`${dateStr}T00:00:00`);
  const endLocal = new Date(`${dateStr}T23:59:59.999`);
  return {
    fromDate: startLocal.toISOString(),
    tillDate: endLocal.toISOString()
  };
}

async function loadPrices(){
  try{
    els.status.textContent = "Prijzen laden...";
    const {fromDate,tillDate} = localDayUtcRange(els.date.value);
    const params = new URLSearchParams({
      fromDate,
      tillDate,
      interval: els.interval.value,
      usageType: "1",
      inclBtw: "true"
    });

    const res = await fetch(`${API}?${params}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const raw = data.Prices || data.prices || [];
    const prices = raw.map(p => ({
      time: new Date(p.readingDate || p.ReadingDate),
      price: Number(p.price ?? p.Price)
    })).filter(p => Number.isFinite(p.price));

    if(!prices.length) throw new Error("Geen prijzen beschikbaar voor deze datum.");

    render(prices);
    els.status.textContent = `Geladen: ${prices.length} prijzen.`;
  }catch(err){
    els.status.textContent = `Fout: ${err.message}`;
  }
}

function euro(v){ return `€ ${v.toFixed(4)}`; }
function time(d){ return d.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}); }

function render(prices){
  const values = prices.map(p=>p.price);
  const min = Math.min(...values), max = Math.max(...values);
  const avg = values.reduce((a,b)=>a+b,0)/values.length;
  const now = new Date();

  const current = prices.find((p,i)=>{
    const next = prices[i+1]?.time || new Date(p.time.getTime()+60*60*1000);
    return now >= p.time && now < next;
  });

  els.now.textContent = current ? euro(current.price) : "–";
  els.min.textContent = euro(min);
  els.max.textContent = euro(max);
  els.avg.textContent = euro(avg);

  els.chart.innerHTML = "";
  prices.forEach(p=>{
    const h = 30 + ((p.price - min) / Math.max(max-min,0.0001)) * 250;
    const b = document.createElement("div");
    b.className = "bar";
    if(p.price === min) b.classList.add("cheap");
    if(p.price === max) b.classList.add("expensive");
    if(current && p.time.getTime() === current.time.getTime()) b.classList.add("now");
    b.style.height = `${h}px`;
    b.title = `${time(p.time)} · ${euro(p.price)}/kWh`;
    els.chart.appendChild(b);
  });

  els.tbody.innerHTML = prices.map(p =>
    `<tr><td>${time(p.time)}</td><td>${euro(p.price)} / kWh</td></tr>`
  ).join("");
}
</script>
</body>
</html>
