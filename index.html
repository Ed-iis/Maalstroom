<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>stroomprijzen</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #0b1220;
      --border: #263244;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --button: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px;
      padding-bottom: 40px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: .2px;
      text-transform: lowercase;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 600;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin: 14px 0;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: white;
      padding: 11px 15px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    button:active {
      transform: translateY(1px);
    }

    .muted {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.4;
    }

    .status {
      margin: 10px 0 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (min-width: 700px) {
      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .stat {
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 16px;
      padding: 13px;
      min-height: 82px;
    }

    .label {
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 6px;
    }

    .value {
      font-size: 1.22rem;
      font-weight: 750;
      word-break: break-word;
    }

    .chart-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    #chart {
      height: 300px;
      min-width: 650px;
      display: flex;
      align-items: end;
      gap: 5px;
      padding-top: 18px;
      padding-bottom: 28px;
      position: relative;
    }

    .bar-wrap {
      flex: 1;
      min-width: 22px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      position: relative;
    }

    .bar {
      width: 100%;
      min-height: 4px;
      border-radius: 7px 7px 0 0;
      background: var(--blue);
      position: relative;
    }

    .bar.cheap {
      background: var(--green);
    }

    .bar.expensive {
      background: var(--red);
    }

    .bar.now {
      outline: 2px solid white;
      outline-offset: 2px;
    }

    .hour {
      position: absolute;
      bottom: -24px;
      font-size: .72rem;
      color: var(--muted);
      transform: rotate(-45deg);
      transform-origin: center;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
    }

    th, td {
      padding: 9px 6px;
      border-bottom: 1px solid var(--border);
      text-align: right;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    .cheap-row td {
      color: var(--green);
      font-weight: 700;
    }

    .expensive-row td {
      color: #f87171;
      font-weight: 700;
    }

    .now-row td {
      background: rgba(255,255,255,.07);
    }
  </style>
</head>

<body>
  <main>
    <h1>stroomprijzen</h1>

    <section class="card">
      <div class="topbar">
        <div>
          <div id="dayTitle" class="value">Vandaag</div>
          <div class="muted">Uurprijzen per kWh, inclusief btw</div>
        </div>

        <button id="switchDay">Morgen bekijken</button>
      </div>

      <p id="status" class="muted status">Prijzen laden...</p>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="label">Nu</div>
        <div id="now" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Goedkoopste</div>
        <div id="min" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Duurste</div>
        <div id="max" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Gemiddeld</div>
        <div id="avg" class="value">–</div>
      </div>
    </section>

    <section class="card">
      <h2>Grafiek</h2>
      <div class="chart-wrap">
        <div id="chart"></div>
      </div>
    </section>

    <section class="card">
      <h2>Tabel</h2>
      <table>
        <thead>
          <tr>
            <th>Tijd</th>
            <th>Prijs</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script>
    const API = "https://api.energyzero.nl/v1/energyprices";

    let showingTomorrow = false;

    const els = {
      switchDay: document.querySelector("#switchDay"),
      dayTitle: document.querySelector("#dayTitle"),
      status: document.querySelector("#status"),
      now: document.querySelector("#now"),
      min: document.querySelector("#min"),
      max: document.querySelector("#max"),
      avg: document.querySelector("#avg"),
      chart: document.querySelector("#chart"),
      tbody: document.querySelector("#tbody")
    };

    els.switchDay.addEventListener("click", () => {
      showingTomorrow = !showingTomorrow;
      loadPrices();
    });

    loadPrices();

    function selectedDate() {
      const d = new Date();
      if (showingTomorrow) d.setDate(d.getDate() + 1);
      return d;
    }

    function dateLabel(date) {
      return date.toLocaleDateString("nl-NL", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });
    }

    function dayRange(date) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);

      const end = new Date(date);
      end.setHours(23, 59, 59, 999);

      return {
        fromDate: start.toISOString(),
        tillDate: end.toISOString()
      };
    }

    async function loadPrices() {
      resetScreen();

      const date = selectedDate();

      els.switchDay.textContent = showingTomorrow ? "Vandaag bekijken" : "Morgen bekijken";
      els.dayTitle.textContent = showingTomorrow ? "Morgen" : "Vandaag";
      els.status.textContent = "Uurprijzen laden voor " + dateLabel(date) + "...";

      try {
        const range = dayRange(date);

        const params = new URLSearchParams({
          fromDate: range.fromDate,
          tillDate: range.tillDate,
          interval: "4",
          usageType: "1",
          inclBtw: "true"
        });

        const response = await fetch(API + "?" + params.toString());

        if (!response.ok) {
          throw new Error("De prijzen konden niet worden opgehaald.");
        }

        const data = await response.json();
        const raw = data.Prices || data.prices || [];

        const prices = raw
          .map(item => ({
            time: new Date(item.readingDate || item.ReadingDate),
            price: Number(item.price ?? item.Price)
          }))
          .filter(item => Number.isFinite(item.price))
          .sort((a, b) => a.time - b.time);

        if (!prices.length) {
          throw new Error("Nog geen prijzen beschikbaar voor deze dag.");
        }

        render(prices);

        els.status.textContent = "Uurprijzen voor " + dateLabel(date);
      } catch (error) {
        els.status.textContent = error.message;
      }
    }

    function resetScreen() {
      els.now.textContent = "–";
      els.min.textContent = "–";
      els.max.textContent = "–";
      els.avg.textContent = "–";
      els.chart.innerHTML = "";
      els.tbody.innerHTML = "";
    }

    function euro(value) {
      return "€ " + value.toFixed(4);
    }

    function time(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function hourOnly(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit"
      });
    }

    function render(prices) {
      const values = prices.map(item => item.price);

      const min = Math.min(...values);
      const max = Math.max(...values);
      const avg = values.reduce((sum, value) => sum + value, 0) / values.length;

      const now = new Date();

      const current = prices.find((item, index) => {
        const next = prices[index + 1]?.time || new Date(item.time.getTime() + 60 * 60 * 1000);
        return now >= item.time && now < next;
      });

      els.now.textContent = current ? euro(current.price) : "–";
      els.min.textContent = euro(min);
      els.max.textContent = euro(max);
      els.avg.textContent = euro(avg);

      renderChart(prices, min, max, current);
      renderTable(prices, min, max, current);
    }

    function renderChart(prices, min, max, current) {
      els.chart.innerHTML = "";

      prices.forEach(item => {
        const wrap = document.createElement("div");
        wrap.className = "bar-wrap";

        const bar = document.createElement("div");
        bar.className = "bar";

        if (item.price === min) bar.classList.add("cheap");
        if (item.price === max) bar.classList.add("expensive");
        if (current && item.time.getTime() === current.time.getTime()) bar.classList.add("now");

        const height = 18 + ((item.price - min) / Math.max(max - min, 0.0001)) * 250;
        bar.style.height = height + "px";
        bar.title = time(item.time) + " · " + euro(item.price) + " / kWh";

        const hour = document.createElement("div");
        hour.className = "hour";
        hour.textContent = hourOnly(item.time);

        wrap.appendChild(bar);
        wrap.appendChild(hour);
        els.chart.appendChild(wrap);
      });
    }

    function renderTable(prices, min, max, current) {
      els.tbody.innerHTML = "";

      prices.forEach(item => {
        const row = document.createElement("tr");

        if (item.price === min) row.classList.add("cheap-row");
        if (item.price === max) row.classList.add("expensive-row");
        if (current && item.time.getTime() === current.time.getTime()) row.classList.add("now-row");

        const timeCell = document.createElement("td");
        timeCell.textContent = time(item.time);

        const priceCell = document.createElement("td");
        priceCell.textContent = euro(item.price) + " / kWh";

        row.appendChild(timeCell);
        row.appendChild(priceCell);

        els.tbody.appendChild(row);
      });
    }
  </script>
</body>
</html>
