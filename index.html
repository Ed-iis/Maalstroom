<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>uurprijzen vandaag</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #0b1220;
      --border: #263244;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --button: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    main {
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: .2px;
      text-transform: lowercase;
    }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: white;
      padding: 9px 12px;
      font-size: .95rem;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    button:active {
      transform: translateY(1px);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 0 0 auto;
    }

    .stat {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      min-height: 66px;
    }

    .label {
      color: var(--muted);
      font-size: .78rem;
      margin-bottom: 4px;
    }

    .value {
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1.15;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #status {
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.25;
      min-height: 18px;
      margin: 0 0 6px;
      flex: 0 0 auto;
    }

    #chart {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
      align-items: stretch;
    }

    .bar-wrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      position: relative;
      overflow: hidden;
    }

    .bar {
      min-height: 5px;
      border-radius: 5px 5px 0 0;
      background: var(--blue);
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .bar.cheap {
      background: var(--green);
    }

    .bar.expensive {
      background: var(--red);
    }

    .bar.now {
      outline: 2px solid white;
      outline-offset: -2px;
    }

    .bar-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: rgba(255,255,255,.92);
      font-size: clamp(.48rem, 1.65vw, .68rem);
      font-weight: 750;
      line-height: 1;
      padding: 5px 0;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
      user-select: none;
    }

    .empty {
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
      padding: 16px;
      font-size: .95rem;
    }

    @media (max-height: 680px) {
      main {
        padding: 9px;
        gap: 8px;
      }

      h1 {
        font-size: 1.02rem;
      }

      button {
        padding: 8px 10px;
        font-size: .86rem;
      }

      .stat {
        min-height: 58px;
        padding: 8px 10px;
      }

      .value {
        font-size: 1.18rem;
      }

      .label {
        font-size: .72rem;
      }

      .card {
        padding: 8px;
      }

      #status {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main>
    <header class="topbar">
      <h1 id="title">uurprijzen vandaag</h1>
      <button id="switchDay">morgen</button>
    </header>

    <section class="stats">
      <div class="stat">
        <div class="label">Nu</div>
        <div id="now" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Gemiddeld</div>
        <div id="avg" class="value">–</div>
      </div>
    </section>

    <section class="card">
      <p id="status">Laden...</p>
      <div id="chart"></div>
    </section>
  </main>

  <script>
    const API = "https://api.energyzero.nl/v1/energyprices";

    let showingTomorrow = false;

    const els = {
      title: document.querySelector("#title"),
      switchDay: document.querySelector("#switchDay"),
      status: document.querySelector("#status"),
      now: document.querySelector("#now"),
      avg: document.querySelector("#avg"),
      chart: document.querySelector("#chart")
    };

    els.switchDay.addEventListener("click", () => {
      showingTomorrow = !showingTomorrow;
      loadPrices();
    });

    loadPrices();

    function selectedDate() {
      const date = new Date();
      if (showingTomorrow) date.setDate(date.getDate() + 1);
      return date;
    }

    function dayRange(date) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);

      const end = new Date(date);
      end.setHours(23, 59, 59, 999);

      return {
        fromDate: start.toISOString(),
        tillDate: end.toISOString()
      };
    }

    async function loadPrices() {
      resetScreen();

      const date = selectedDate();
      const dayText = showingTomorrow ? "morgen" : "vandaag";

      document.title = "uurprijzen " + dayText;
      els.title.textContent = "uurprijzen " + dayText;
      els.switchDay.textContent = showingTomorrow ? "vandaag" : "morgen";
      els.status.textContent = "Laden...";

      try {
        const range = dayRange(date);

        const params = new URLSearchParams({
          fromDate: range.fromDate,
          tillDate: range.tillDate,
          interval: "4",
          usageType: "1",
          inclBtw: "true"
        });

        const response = await fetch(API + "?" + params.toString());

        if (!response.ok) {
          throw new Error("Prijzen konden niet worden opgehaald.");
        }

        const data = await response.json();
        const raw = data.Prices || data.prices || [];

        const prices = raw
          .map(item => ({
            time: new Date(item.readingDate || item.ReadingDate),
            price: Number(item.price ?? item.Price)
          }))
          .filter(item => Number.isFinite(item.price))
          .sort((a, b) => a.time - b.time);

        if (!prices.length) {
          throw new Error("Nog geen prijzen beschikbaar.");
        }

        render(prices);
        els.status.textContent = "";
      } catch (error) {
        els.status.textContent = error.message;
        els.chart.innerHTML = '<div class="empty">' + error.message + '</div>';
      }
    }

    function resetScreen() {
      els.now.textContent = "–";
      els.avg.textContent = "–";
      els.chart.innerHTML = "";
    }

    function euro(value) {
      return "€" + value.toFixed(2);
    }

    function hourNumber(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        hour12: false
      });
    }

    function render(prices) {
      const values = prices.map(item => item.price);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const avg = values.reduce((sum, value) => sum + value, 0) / values.length;

      const now = new Date();

      const current = prices.find((item, index) => {
        const next = prices[index + 1]?.time || new Date(item.time.getTime() + 60 * 60 * 1000);
        return now >= item.time && now < next;
      });

      els.now.textContent = current ? euro(current.price) : "–";
      els.avg.textContent = euro(avg);

      renderChart(prices, min, max, current);
    }

    function renderChart(prices, min, max, current) {
      els.chart.innerHTML = "";

      const byHour = new Map();

      prices.forEach(item => {
        byHour.set(item.time.getHours(), item);
      });

      for (let hour = 0; hour < 24; hour++) {
        const item = byHour.get(hour);

        const wrap = document.createElement("div");
        wrap.className = "bar-wrap";

        if (!item) {
          const emptyBar = document.createElement("div");
          emptyBar.className = "bar";
          emptyBar.style.height = "5px";
          wrap.appendChild(emptyBar);
          els.chart.appendChild(wrap);
          continue;
        }

        const bar = document.createElement("div");
        bar.className = "bar";

        if (item.price === min) bar.classList.add("cheap");
        if (item.price === max) bar.classList.add("expensive");
        if (current && item.time.getTime() === current.time.getTime()) bar.classList.add("now");

        const height = 12 + ((item.price - min) / Math.max(max - min, 0.0001)) * 88;
        bar.style.height = height + "%";
        bar.title = hourNumber(item.time) + " - " + euro(item.price);

        const label = document.createElement("div");
        label.className = "bar-label";
        label.textContent = hourNumber(item.time) + " - " + euro(item.price);

        bar.appendChild(label);
        wrap.appendChild(bar);
        els.chart.appendChild(wrap);
      }
    }
  </script>
</body>
</html>
