<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>uurprijzen vandaag</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #0b1220;
      --border: #263244;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #facc15;
      --button: #2563eb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    main {
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
      padding: 11px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: .2px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: white;
      padding: 8px 11px;
      font-size: .88rem;
      cursor: pointer;
      font-weight: 750;
      white-space: nowrap;
    }

    button:active { transform: translateY(1px); }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      flex: 0 0 auto;
      align-items: stretch;
    }

    .stat, .modebox {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 9px 10px;
      min-height: 60px;
    }

    .modebox {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      min-width: 108px;
    }

    .modebox button {
      width: 100%;
      height: 100%;
      background: #334155;
      border-radius: 15px;
      font-size: .84rem;
      padding: 8px;
    }

    .label {
      color: var(--muted);
      font-size: .72rem;
      margin-bottom: 3px;
    }

    .value {
      font-size: 1.18rem;
      font-weight: 850;
      line-height: 1.12;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #status {
      color: var(--muted);
      font-size: .74rem;
      line-height: 1.2;
      min-height: 15px;
      margin: 0 0 4px;
      flex: 0 0 auto;
    }

    #chart {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 2px;
      align-items: stretch;
      padding-bottom: 58px;
      position: relative;
    }

    .bar-wrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: stretch;
      position: relative;
      overflow: visible;
    }

    .bar {
      min-height: 5px;
      border-radius: 5px 5px 0 0;
      background: var(--blue);
      position: relative;
    }

    .bar.cheap { background: var(--green); }
    .bar.expensive { background: var(--red); }

    .bar.now {
      background: var(--yellow);
      box-shadow:
        0 0 0 2px white inset,
        0 0 14px rgba(250, 204, 21, .95);
      z-index: 2;
    }

    .bar.now::before {
      content: "";
      position: absolute;
      top: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px white;
    }

    .bar-label {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translate(-50%, 100%) rotate(-90deg);
      transform-origin: top left;
      color: var(--muted);
      font-size: clamp(.48rem, 1.65vw, .66rem);
      font-weight: 750;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      padding-top: 7px;
    }

    .empty {
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 100%;
      padding: 16px;
      font-size: .92rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 390px) {
      main { padding: 9px; gap: 8px; }
      h1 { font-size: .98rem; }
      button { font-size: .8rem; padding: 7px 9px; }
      .stats-row { gap: 6px; }
      .stat { padding: 8px; min-height: 56px; }
      .modebox { min-width: 96px; min-height: 56px; }
      .value { font-size: 1.02rem; }
      .label { font-size: .68rem; }
      #chart { padding-bottom: 54px; gap: 1px; }
      .bar-label { font-size: .48rem; }
    }

    @media (max-height: 680px) {
      main { padding: 8px; gap: 7px; }
      h1 { font-size: .98rem; }
      .stat, .modebox { min-height: 52px; }
      .value { font-size: 1.02rem; }
      #status { display: none; }
      .card { padding: 7px; }
      #chart { padding-bottom: 50px; }
    }
  </style>
</head>

<body>
  <main>
    <header class="topbar">
      <h1 id="title">uurprijzen vandaag</h1>
      <button id="switchDay">morgen</button>
    </header>

    <section class="stats-row">
      <div class="stat">
        <div class="label">Nu</div>
        <div id="now" class="value">–</div>
      </div>

      <div class="stat">
        <div class="label">Gemiddeld</div>
        <div id="avg" class="value">–</div>
      </div>

      <div class="modebox">
        <button id="switchMode">afnemen</button>
      </div>
    </section>

    <section class="card">
      <p id="status">Laden...</p>
      <div id="chart"></div>
    </section>
  </main>

  <script>
    const API = "https://api.energyzero.nl/v1/energyprices";

    /*
      Kosteninstellingen

      API-prijs:
      - EnergyZero-prijs wordt opgehaald inclusief btw.
      - Daarom tellen we alleen extra bedragen op die nog niet in de kale dynamische prijs zitten.

      2026:
      - Energiebelasting elektriciteit incl. btw: €0,11085/kWh.
      - ODE is afgeschaft/verwerkt in energiebelasting.
      - Netbeheerkosten zijn doorgaans vaste periodieke kosten, niet variabel per kWh.
    */
    const BTW = 0.21;

    const COSTS = {
      energyTaxInclVat: 0.11085,

      supplierMarkupUseExVat: 0.04073,
      supplierDeductionReturnExVat: 0.0453,

      variableGridCostInclVat: 0
    };

    let showingTomorrow = false;
    let mode = "use"; // use = afnemen, return = terugleveren

    const els = {
      title: document.querySelector("#title"),
      switchDay: document.querySelector("#switchDay"),
      switchMode: document.querySelector("#switchMode"),
      status: document.querySelector("#status"),
      now: document.querySelector("#now"),
      avg: document.querySelector("#avg"),
      chart: document.querySelector("#chart")
    };

    els.switchDay.addEventListener("click", () => {
      showingTomorrow = !showingTomorrow;
      loadPrices();
    });

    els.switchMode.addEventListener("click", () => {
      mode = mode === "use" ? "return" : "use";
      loadPrices();
    });

    loadPrices();

    function selectedDate() {
      const date = new Date();
      if (showingTomorrow) date.setDate(date.getDate() + 1);
      return date;
    }

    function dayRange(date) {
      const start = new Date(date);
      start.setHours(0, 0, 0, 0);

      const end = new Date(date);
      end.setHours(23, 59, 59, 999);

      return {
        fromDate: start.toISOString(),
        tillDate: end.toISOString()
      };
    }

    async function loadPrices() {
      resetScreen();

      const date = selectedDate();
      const dayText = showingTomorrow ? "morgen" : "vandaag";

      document.title = "uurprijzen " + dayText;
      els.title.textContent = "uurprijzen " + dayText;
      els.switchDay.textContent = showingTomorrow ? "vandaag" : "morgen";
      els.switchMode.textContent = mode === "use" ? "afnemen" : "terugleveren";
      els.status.textContent = "Laden...";

      try {
        const range = dayRange(date);

        const params = new URLSearchParams({
          fromDate: range.fromDate,
          tillDate: range.tillDate,
          interval: "4",
          usageType: "1",
          inclBtw: "true"
        });

        const response = await fetch(API + "?" + params.toString());

        if (!response.ok) {
          throw new Error("Prijzen konden niet worden opgehaald.");
        }

        const data = await response.json();
        const raw = data.Prices || data.prices || [];

        const prices = raw
          .map(item => {
            const baseInclVat = Number(item.price ?? item.Price);

            return {
              time: new Date(item.readingDate || item.ReadingDate),
              basePrice: baseInclVat,
              price: totalPrice(baseInclVat)
            };
          })
          .filter(item => Number.isFinite(item.price))
          .sort((a, b) => a.time - b.time);

        if (!prices.length) {
          throw new Error("Nog geen prijzen beschikbaar.");
        }

        render(prices);
        els.status.textContent = "";
      } catch (error) {
        els.status.textContent = error.message;
        els.chart.innerHTML = '<div class="empty">' + error.message + '</div>';
      }
    }

    function totalPrice(baseInclVat) {
      if (mode === "use") {
        const markupInclVat = COSTS.supplierMarkupUseExVat * (1 + BTW);

        return (
          baseInclVat +
          markupInclVat +
          COSTS.energyTaxInclVat +
          COSTS.variableGridCostInclVat
        );
      }

      const deductionInclVat = COSTS.supplierDeductionReturnExVat * (1 + BTW);

      return baseInclVat - deductionInclVat;
    }

    function resetScreen() {
      els.now.textContent = "–";
      els.avg.textContent = "–";
      els.chart.innerHTML = "";
    }

    function euro(value) {
      const sign = value < 0 ? "-€" : "€";
      return sign + Math.abs(value).toFixed(2);
    }

    function hourNumber(date) {
      return date.toLocaleTimeString("nl-NL", {
        hour: "2-digit",
        hour12: false
      });
    }

    function render(prices) {
      const values = prices.map(item => item.price);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const avg = values.reduce((sum, value) => sum + value, 0) / values.length;

      const now = new Date();

      const current = prices.find((item, index) => {
        const next = prices[index + 1]?.time || new Date(item.time.getTime() + 60 * 60 * 1000);
        return now >= item.time && now < next;
      });

      els.now.textContent = current ? euro(current.price) : "–";
      els.avg.textContent = euro(avg);

      renderChart(prices, min, max, current);
    }

    function renderChart(prices, min, max, current) {
      els.chart.innerHTML = "";

      const byHour = new Map();

      prices.forEach(item => {
        byHour.set(item.time.getHours(), item);
      });

      const range = Math.max(max - min, 0.0001);

      for (let hour = 0; hour < 24; hour++) {
        const item = byHour.get(hour);

        const wrap = document.createElement("div");
        wrap.className = "bar-wrap";

        if (!item) {
          const emptyBar = document.createElement("div");
          emptyBar.className = "bar";
          emptyBar.style.height = "5px";
          wrap.appendChild(emptyBar);
          els.chart.appendChild(wrap);
          continue;
        }

        const bar = document.createElement("div");
        bar.className = "bar";

        if (item.price === min) bar.classList.add("cheap");
        if (item.price === max) bar.classList.add("expensive");
        if (current && item.time.getTime() === current.time.getTime()) bar.classList.add("now");

        const height = 9 + ((item.price - min) / range) * 91;
        bar.style.height = height + "%";
        bar.title = hourNumber(item.time) + " - " + euro(item.price);

        const label = document.createElement("div");
        label.className = "bar-label";
        label.textContent = hourNumber(item.time) + " - " + euro(item.price);

        wrap.appendChild(bar);
        wrap.appendChild(label);
        els.chart.appendChild(wrap);
      }
    }
  </script>
</body>
</html>
